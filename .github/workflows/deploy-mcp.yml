name: Deploy PrepOps MCP

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - 'prompts/**'
      - 'personas/**'
      - 'incidents/**'
      - 'incident-templates/**'
      - 'rubrics/**'
      - 'knowledge/**'
      - 'engine/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd mcp-server && npm ci
      - name: Bundle engine assets
        run: cd mcp-server && npm run bundle
      - name: Deploy to Cloudflare Workers
        run: cd mcp-server && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
