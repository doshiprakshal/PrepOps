company: Stripe
role: Infrastructure Engineer
level: Senior
level_display: "Senior Infrastructure Engineer"
persona: stripe_engineering

interview_structure:
  rounds: 5
  format: "Recruiter → Technical phone → 5 onsite rounds"
  round_types:
    - "Coding (Go or Ruby — correctness first)"
    - "Systems and Linux Deep Dive"
    - "Distributed Systems and Reliability"
    - "System Design (financial systems context)"
    - "Behavioral"

topic_weights:
  correctness_edge_cases: 30%
  linux_networking: 25%
  distributed_systems: 20%
  system_design: 15%
  behavioral: 10%

stripe_specific_context:
  critical_constraints:
    - "Money must not be lost or double-charged — correctness is non-negotiable"
    - "Operations must be idempotent by default"
    - "Partial failures are normal — designs must handle them explicitly"
    - "Every system failure has a financial implication — blast radius always matters"
  culture:
    - Precise communication: say exactly what you mean
    - First principles: don't cite authority, reason from fundamentals
    - Written communication: Stripe is a writing-heavy culture

topics_tested:
  correctness_and_edge_cases:
    - What happens when a network call fails mid-operation?
    - How do you guarantee exactly-once semantics?
    - What is the failure mode of your proposed solution?
    - Edge cases asked explicitly for every design and every code snippet
  linux_networking:
    - TCP internals: exactly what happens during a connection failure mid-transfer
    - File system atomicity: how to write a file safely
    - Process isolation: what does a process actually own?
    - Network protocols at depth: TLS, HTTP/2, gRPC internals
  distributed_systems:
    - Distributed transactions: 2PC, sagas, compensating transactions
    - Consensus: what does Raft guarantee? What doesn't it?
    - Idempotency keys: how to implement safely
    - Clock skew: what breaks when clocks disagree?
  system_design:
    - Payment processing architecture: what happens when the processor is down?
    - Audit trail design: immutable, complete, queryable
    - Financial reconciliation: how do you detect and handle discrepancies?
  behavioral:
    - Disagreement and resolution
    - Correctness vs speed trade-off decisions
    - Complex system debugging stories (with specific technical details)

expected_depth:
  correctness_edge_cases: very-high
  linux_networking: high
  distributed_systems: high
  system_design: medium-high
  behavioral: medium

hiring_bar:
  strong_hire: >
    Every answer considers the failure mode. Idempotency is instinctive, not an
    afterthought. Defends positions under pushback because they reasoned it out,
    not because they're confident. Writing is precise.
  hire: >
    Solid technical depth with explicit attention to correctness and edge cases.
    Distributed systems fundamentals are sound. Can reason about financial system constraints.
  borderline: >
    Good general infrastructure skills but hand-waves failure modes. "It retries"
    without describing the retry semantics. Can't explain idempotency from first principles.
  no_hire: >
    Assumes happy path. Can't describe exact failure behavior of their own proposed solutions.
    Vague about distributed systems fundamentals.

common_mistakes:
  - "'It retries' without specifying the retry semantics and idempotency guarantee"
  - "Designing distributed operations without explicit partial failure handling"
  - "Vague about what 'eventually consistent' means in specific failure scenarios"
  - "Can't explain how they'd test the edge case they described"
  - "Backing down from a correct answer under pushback without new reasoning"

prep_focus:
  high:
    - Distributed systems failure modes: partial failure, network partition, clock skew
    - Idempotency implementation patterns — retry keys, conditional writes
    - TCP and network protocol internals — exactly what happens at each failure point
    - File system atomicity: write-then-rename, fsync, ordering guarantees
  medium:
    - Consensus algorithms at conceptual depth (Raft, Paxos — what they guarantee)
    - Database isolation levels and anomalies
    - Distributed tracing and observability in payment systems
  lower:
    - Pure algorithm challenges
    - Frontend or application layer concerns
