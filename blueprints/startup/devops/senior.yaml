company: Startup
role: Senior DevOps / Platform Engineer
level: Senior
level_display: "Senior DevOps at a Series A-C startup"
persona: startup_devops

interview_structure:
  rounds: 3
  format: "Recruiter → Technical interview → Founder/CTO conversation"
  round_types:
    - "Technical breadth (multi-domain)"
    - "Practical problem solving (take-home or live)"
    - "Cultural and values (founder conversation)"

topic_weights:
  technical_breadth: 30%
  practical_judgment: 25%
  ci_cd_automation: 20%
  cloud_infrastructure: 15%
  behavioral: 10%

startup_specific_context:
  constraints:
    - "Usually no dedicated SRE team — this person IS the platform team"
    - "Speed over perfect architecture — time to market matters"
    - "Budget consciousness — AWS bill matters at Series A"
    - "Team size: typically 5-30 engineers who will all use the platform"
  what_they_actually_need:
    - "Someone who can set up CI/CD on day 1 without being told how"
    - "Someone who won't over-engineer (k8s for 3 services is not pragmatic)"
    - "Someone who will document what they build (no bus factor tolerance)"

topics_tested:
  technical_breadth:
    - Kubernetes (but: can you decide when NOT to use it?)
    - AWS core services: EC2, ECS, RDS, S3, IAM, VPC
    - Linux administration and debugging
    - Basic networking: DNS, load balancers, TLS
  practical_judgment:
    - "Which tool would you choose for X and why? (given constraints)"
    - "How would you handle this with limited time and budget?"
    - "What would you NOT build in the first 6 months?"
    - "Show me how you'd debug this" (live or take-home)
  ci_cd_automation:
    - GitHub Actions, CircleCI, or similar — hands-on
    - Deployment strategies: blue/green, canary, feature flags
    - Rollback procedures — how fast and how tested?
    - IaC: Terraform or Pulumi for small-team usage
  cloud_infrastructure:
    - AWS cost optimization basics
    - Security fundamentals: IAM least-privilege, secrets management
    - Scaling: when to scale and how
  behavioral:
    - "Tell me about a time you had to make a technical decision without full information"
    - "How do you decide when to build vs buy?"
    - "How do you manage technical debt at a fast-moving company?"

expected_depth:
  technical_breadth: medium-high
  practical_judgment: high
  ci_cd_automation: medium-high
  cloud_infrastructure: medium
  behavioral: medium

hiring_bar:
  strong_hire: >
    Has shipped real infrastructure at a small company. Makes pragmatic decisions
    without being prompted. First answer to "how would you set this up?" is
    reasonable and buildable today, not a perfectly architected ideal.
  hire: >
    Solid breadth across the stack. Shows judgment about when to simplify.
    Has delivered real CI/CD pipelines and infrastructure for small teams.
  borderline: >
    Good technical skills but tends to over-engineer. Judgment about startup
    constraints needs coaching. Limited real startup experience.
  no_hire: >
    Enterprise mindset at startup scale. Proposes solutions that require
    a team of 5 to operate. Can't prioritize.

common_mistakes:
  - "Proposing Kubernetes for a 3-service startup"
  - "Perfect architecture that would take 6 months to build before shipping value"
  - "Not asking about team size and current state before proposing a solution"
  - "Ignoring cost when discussing AWS services"
  - "Breadth gaps in basic Linux or cloud networking"

prep_focus:
  high:
    - GitHub Actions: build, test, deploy pipeline from scratch
    - Terraform for AWS: VPC, ECS, RDS, IAM from scratch
    - AWS core services and their failure modes
    - Deployment strategies for small teams (focus on simplicity)
  medium:
    - Docker and container basics
    - Monitoring basics: Datadog or Grafana for small teams
    - Kubernetes basics (for teams that are growing into it)
  lower:
    - Advanced Kubernetes internals
    - Large-scale distributed systems design
    - Chaos engineering (out of scope for most startups)
