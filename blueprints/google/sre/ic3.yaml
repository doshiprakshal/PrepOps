company: Google
role: Site Reliability Engineer
level: IC3
level_display: "New Grad / Early Career SRE"
persona: google_sre

interview_structure:
  rounds: 4
  format: "Technical phone screen → 4 virtual onsite rounds"
  round_types:
    - "Coding (Python or Go scripting)"
    - "Linux and Systems"
    - "Networking and Troubleshooting"
    - "Behavioral / Googleyness"

topic_weights:
  coding: 30%
  linux: 25%
  networking: 15%
  troubleshooting: 20%
  system_design: 5%
  behavioral: 5%

topics_tested:
  coding:
    - Python or Go scripting — parsing logs, processing data, automation
    - Data structures for systems problems (queues, heaps, graphs for dependency resolution)
    - Not LeetCode-hard algorithms — practical systems scripting
  linux:
    - Process management (ps, top, signals, zombies)
    - Performance tools (iostat, vmstat, sar)
    - File descriptors, open files, lsof
    - Basic shell scripting
  networking:
    - TCP/IP fundamentals — connection states, handshake
    - DNS resolution chain
    - What happens when you type a URL
  troubleshooting:
    - Debugging methodology — hypothesis first, not guess-and-check
    - Systematic elimination
    - Tool selection
  system_design:
    - Very light or absent at IC3
    - If present: small reliability-focused design (monitoring for a simple service)

expected_depth:
  coding: medium
  linux: medium
  networking: foundational
  troubleshooting: medium
  system_design: low

hiring_bar:
  strong_hire: >
    Shows production instinct despite limited experience. Asks about failure modes
    before being prompted. Can write a working script under pressure. Debugging
    process is systematic even if slow.
  hire: >
    Solid fundamentals in Linux and networking. Can follow a debugging process
    with prompting. Writes working code for systems tasks.
  borderline: >
    Knows concepts but struggles to apply them to scenarios. Can't debug without
    heavy prompting. Code is syntactically correct but logically flawed.
  no_hire: >
    Cannot reason about Linux fundamentals. Debugging is random. Can't write a
    working script for basic systems tasks.

common_mistakes:
  - "Starting to answer before forming a hypothesis — jumping to solutions"
  - "Not asking clarifying questions before writing code or designing"
  - "Treating all tools equally — not knowing which to reach for first"
  - "Weak on Linux fundamentals despite applying for SRE"
  - "Memorized definitions without production context"

prep_focus:
  high:
    - Linux process management and performance tools (use them, not just describe them)
    - TCP/IP and DNS from first principles
    - Python scripting for log parsing and automation
    - Debugging methodology — hypothesis formation, systematic elimination
  medium:
    - Kubernetes basics (pods, services, deployments)
    - Monitoring concepts (what metrics matter and why)
    - Git and CI/CD basics
  lower:
    - Advanced Kubernetes internals
    - Large-scale system design
    - Deep protocol internals
