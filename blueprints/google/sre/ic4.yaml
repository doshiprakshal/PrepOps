company: Google
role: Site Reliability Engineer
level: IC4
level_display: "Senior SRE"
persona: google_sre

interview_structure:
  rounds: 5
  format: "Technical screen → 5 virtual onsite rounds"
  round_types:
    - "Coding (Python or Go)"
    - "Linux and Systems Deep Dive"
    - "Networking and Distributed Systems"
    - "System Design (reliability-focused)"
    - "Behavioral / Leadership"

topic_weights:
  coding: 20%
  linux: 20%
  networking: 15%
  troubleshooting: 20%
  system_design: 15%
  sre_concepts: 10%

topics_tested:
  coding:
    - Go or Python — production-quality code, not just working code
    - Error handling, edge cases, and cleanup
    - Performance-aware: time and space complexity for systems tasks
  linux:
    - Kernel internals: scheduling, memory management concepts
    - Performance analysis: flame graphs, perf, strace, ltrace
    - File system internals: inodes, page cache, dirty pages
    - Network stack: socket buffers, TCP tuning, conntrack
  networking:
    - TCP internals: window scaling, congestion control, TIME_WAIT
    - Load balancer types and trade-offs
    - DNS at depth: TTL implications, negative caching, split-horizon
  troubleshooting:
    - Multi-system production incidents
    - Root cause vs symptoms distinction
    - Blast radius assessment before action
  system_design:
    - Reliability-focused designs: high availability, fault tolerance
    - SLO design: what to measure, how to set thresholds
    - Distributed systems patterns: circuit breakers, retries, idempotency
  sre_concepts:
    - SLOs, SLIs, error budgets — how to set and use them
    - Postmortem culture and blameless analysis
    - Toil definition and reduction strategy

expected_depth:
  coding: medium-high
  linux: high
  networking: medium-high
  troubleshooting: high
  system_design: medium
  sre_concepts: medium

hiring_bar:
  strong_hire: >
    Deep production experience evident without prompting. Can design reliability
    into a system from first principles. SLO thinking is natural, not recited.
    Debugging is fast and methodical — forms a hypothesis in 1-2 exchanges.
  hire: >
    Solid on Linux and networking with genuine depth. System design is coherent
    and covers the key reliability concerns. SLO concepts understood and applied.
  borderline: >
    Strong on some topics, weak on others. System design exists but misses key
    reliability components. SLO knowledge is theoretical, not applied.
  no_hire: >
    IC3-level knowledge at best. System design is not reliability-focused.
    Debugging requires significant prompting at every step.

common_mistakes:
  - "Designing for the happy path — not addressing failure modes in system design"
  - "Treating SLOs as a compliance exercise rather than an operational tool"
  - "Cannot go deep on Linux internals when probed"
  - "Debugging is symptom-first rather than hypothesis-first"
  - "Not considering blast radius before proposing a fix"

prep_focus:
  high:
    - Linux performance tools in depth (perf, strace, eBPF basics)
    - SLO design from scratch (picking the right SLIs, setting error budgets)
    - Production incident case studies — build hypotheses from real scenarios
    - Distributed systems failure modes: split brain, cascading failures, retry storms
  medium:
    - Kubernetes internals (scheduler, kubelet, CNI)
    - Network performance tuning
    - Reliability design patterns (circuit breakers, bulkheads, timeout hierarchies)
  lower:
    - Pure algorithm optimization
    - Frontend or application-layer concerns
