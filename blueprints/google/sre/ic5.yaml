company: Google
role: Site Reliability Engineer
level: IC5
level_display: "Staff SRE / Tech Lead"
persona: google_sre

interview_structure:
  rounds: 6
  format: "Technical screen → 6 virtual onsite rounds including leadership rounds"
  round_types:
    - "Coding (production quality)"
    - "Large-Scale System Design"
    - "SRE Deep Dive (reliability patterns at scale)"
    - "Leadership and Influence"
    - "Behavioral (leadership + impact)"
    - "Cross-functional Collaboration"

topic_weights:
  system_design: 30%
  sre_leadership: 20%
  troubleshooting: 20%
  coding: 10%
  linux_networking: 10%
  behavioral: 10%

topics_tested:
  system_design:
    - Multi-region highly available systems
    - SLO architecture at org scale
    - Reliability design for systems serving millions of users
    - Trade-offs between consistency, availability, and partition tolerance
    - Cost vs reliability trade-offs with justification
  sre_leadership:
    - Error budget policy and enforcement — handling teams burning budget
    - Capacity planning methodology
    - On-call health at org scale — toil measurement and reduction
    - Postmortem quality improvement
    - Incident response at scale (multi-team, multi-service incidents)
  troubleshooting:
    - Complex multi-system incidents requiring cross-team coordination
    - Unknown-unknown failure modes
    - When to escalate vs investigate independently
  coding:
    - Less emphasis than IC3/IC4 — production quality expected by default
    - Systems tooling, not algorithmic challenges
  behavioral:
    - How have you influenced reliability standards across teams?
    - How have you handled disagreement with engineering leadership?
    - Describe a time you drove org-wide change

expected_depth:
  system_design: very-high
  sre_leadership: high
  troubleshooting: very-high
  coding: medium-high
  linux_networking: medium
  behavioral: high

hiring_bar:
  strong_hire: >
    Designs for scale and operations simultaneously — reliability is baked in, not
    bolted on. Has strong opinions on SRE practice and defends them with evidence.
    Shows how they've moved organizations, not just teams.
  hire: >
    Solid senior SRE who can design reliable large-scale systems. SLO thinking is
    applied and org-aware. Can articulate how they've influenced reliability culture.
  borderline: >
    Strong technical depth but leadership signal is weak. System design is good but
    doesn't consider organizational complexity. Org impact is described but not owned.
  no_hire: >
    IC4-level signal at best. Designs systems without considering operational reality.
    SRE principles are recited, not applied. Cannot articulate cross-team impact.

common_mistakes:
  - "Designing technically correct systems that ignore operational complexity"
  - "Citing SRE book theory without demonstrating application"
  - "Describing org impact in terms of 'we' without owning a specific change"
  - "Not asking about team context in system design — designing in a vacuum"
  - "Accepting the first system design question without clarifying organizational constraints"

prep_focus:
  high:
    - Case studies of real large-scale incidents and their postmortems (public ones)
    - SRE organizational patterns: embedding vs centralized, error budget policy
    - Multi-region system design with explicit reliability analysis
    - Leadership stories: specific examples of influencing reliability culture
  medium:
    - Chaos engineering principles and practice
    - Capacity planning methodologies
    - Toil reduction frameworks and measurement
  lower:
    - New language features or framework internals
    - Algorithmic complexity (assumed at this level)
