company: Netflix
role: Platform Engineer
level: Staff
level_display: "Staff Platform Engineer"
persona: netflix_sre

interview_structure:
  rounds: 5
  format: "Recruiter → Hiring manager call → 5 technical rounds"
  round_types:
    - "System Design (large-scale)"
    - "Production Experience Deep Dive"
    - "Chaos Engineering and Reliability"
    - "Technical Breadth (multi-domain)"
    - "Culture and Values (Freedom and Responsibility)"

topic_weights:
  system_design: 35%
  production_experience: 25%
  culture_values: 20%
  technical_breadth: 15%
  coding: 5%

netflix_culture_signals:
  freedom_and_responsibility:
    - "Acts like an owner — makes decisions without asking permission"
    - "Shares context generously, doesn't hoard information"
    - "Gives and receives feedback directly and in the moment"
    - "Sets their own direction from a goal, not a task list"
  keeper_test: >
    "Would your manager fight to keep you if you got a competing offer?
    Netflix expects this to be clearly yes for every person they hire."

topics_tested:
  system_design:
    - Global-scale systems: designs for millions of concurrent users across hundreds of countries
    - Failure-first thinking: failure mode analysis before happy path
    - Trade-off articulation: why this design and not the obvious alternative?
    - Cost awareness: Netflix runs on AWS at massive scale — cost matters
    - Resilience patterns: active-active, chaos tolerance, graceful degradation
  production_experience:
    - Real incidents: what went wrong, how you found it, what you changed permanently
    - Chaos engineering: have you deliberately injected failures? What did you learn?
    - "What breaks this at 3am?" — expected to have real answers from real experience
    - On-call experience: what does a hard page look like for your systems?
  culture_values:
    - Decisions made with incomplete information: how do you handle ambiguity?
    - Context over control: how do you align teams without mandating behavior?
    - Candor: have you disagreed publicly with a leader? How did it go?
  technical_breadth:
    - Kubernetes, AWS, distributed systems, networking — breadth expected at Staff level
    - Doesn't need to be deepest on every topic, but no obvious blindspots

expected_depth:
  system_design: very-high
  production_experience: very-high
  culture_values: high
  technical_breadth: medium-high
  coding: low-medium

hiring_bar:
  strong_hire: >
    Designs for failure as a default, not an afterthought. Has real chaos engineering
    experience. Embodies Freedom and Responsibility — makes decisions and owns outcomes.
    Would pass the Keeper Test without hesitation.
  hire: >
    Strong system design at scale with failure thinking. Real production experience
    with clear personal ownership. Culture alignment is evident and genuine.
  borderline: >
    Strong technical signal but culture is uncertain — seems like they need direction
    rather than context. System design is good but failure handling is thin.
  no_hire: >
    System design is theory without production grounding. Culture signals are
    performed rather than genuine. Expects to be told what to do.

common_mistakes:
  - "Designing the happy path and leaving failure handling to 'we'd add retry logic'"
  - "Answering culture questions with what they think Netflix wants to hear"
  - "Not having real chaos engineering or reliability experience"
  - "Describing what the team built without taking personal ownership"
  - "Too polished — Netflix values directness over perfection"

prep_focus:
  high:
    - Large-scale system design: failure modes, chaos tolerance, degradation strategies
    - Authentic personal stories about ownership, failure, and recovery
    - Netflix engineering blog — read it, have opinions about it
    - Chaos engineering: ChaosMonkey concept, fault injection, game days
  medium:
    - AWS services at scale: how they fail and how to design around those failures
    - Global CDN and content delivery architecture
    - Cost optimization at scale: spot instances, reserved capacity, waste reduction
  lower:
    - Coding (minimal weight at Staff level)
    - Specific tool expertise (breadth over depth)
