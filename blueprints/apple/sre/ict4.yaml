company: Apple
role: Site Reliability Engineer
level: ICT4
level_display: "Senior SRE"
persona: google_sre

interview_structure:
  rounds: 5
  format: "Recruiter screen → Technical phone → 5 virtual onsite rounds"
  round_types:
    - "Linux and Systems Deep Dive"
    - "Networking and Debugging"
    - "Coding (Python/Go/Swift optional)"
    - "System Design"
    - "Behavioral"

topic_weights:
  linux: 25%
  networking: 20%
  troubleshooting: 25%
  system_design: 15%
  coding: 10%
  behavioral: 5%

topics_tested:
  linux:
    - macOS-specific: launchd vs systemd, BSD vs GNU tooling differences
    - Linux performance: perf, dtrace (macOS), strace, ebpf basics
    - Kernel interaction: syscalls, file descriptors, memory management
    - File system internals including APFS (macOS) and ext4/xfs (Linux)
  networking:
    - TCP/IP at depth
    - DNS — both resolution and authoritative serving
    - TLS/HTTPS internals — certificate chain, handshake, common failures
    - CDN architecture (Apple has a massive CDN — iCloud, App Store, Maps)
    - Network debugging: tcpdump, Wireshark, netstat
  troubleshooting:
    - Production scenario debugging with structured methodology
    - Cross-layer debugging: application → OS → network → hardware
    - Observability: logs, metrics, traces — how to instrument and use
  system_design:
    - Scale: Apple serves billions of devices — designs must handle global scale
    - Privacy by design: data minimization, on-device processing preference
    - High availability with privacy constraints (can't log everything)
  coding:
    - Python scripting for ops automation
    - Go for systems tools
    - Swift optional (valued for Apple-specific tooling)

expected_depth:
  linux: high
  networking: high
  troubleshooting: high
  system_design: medium-high
  coding: medium
  behavioral: low-medium

hiring_bar:
  strong_hire: >
    Deep, cross-layer debugging instinct. Can move from application log to kernel
    syscall to network packet in one investigation. System design considers privacy
    without being prompted. macOS familiarity is a strong positive signal.
  hire: >
    Solid Linux and networking fundamentals with real debugging experience.
    System design is operationally sound. Can reason about privacy trade-offs.
  borderline: >
    Good on one layer (Linux OR networking) but weak on the other.
    System design lacks operational thinking. Debugging isn't cross-layer.
  no_hire: >
    Surface-level Linux and networking. Debugging is guesswork.
    Cannot reason about privacy implications in design.

common_mistakes:
  - "Linux-only thinking when macOS/BSD nuances matter at Apple"
  - "Ignoring privacy implications in system design (huge red flag at Apple)"
  - "Weak on networking internals — Apple's infrastructure is heavily networking-focused"
  - "Not cross-referencing application logs with OS-level signals"

prep_focus:
  high:
    - Cross-layer debugging: app → OS → network (practice connecting these)
    - Network protocol internals: TCP state machine, TLS handshake, DNS chain
    - macOS tooling differences from Linux (launchd, dtrace, BSD tools)
    - Privacy-preserving design patterns
  medium:
    - CDN architecture and caching strategies
    - Large-scale storage systems
    - Distributed systems observability
  lower:
    - Pure algorithm optimization
    - Frontend or mobile-specific concerns
