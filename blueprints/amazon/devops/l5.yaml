company: Amazon
role: DevOps Engineer / Systems Development Engineer
level: L5
level_display: "Senior DevOps Engineer"
persona: amazon_devops

interview_structure:
  rounds: 5
  format: "Phone screen → 5 onsite rounds including bar raiser"
  round_types:
    - "Coding (Python/Go/Shell)"
    - "Systems Design"
    - "Operations and Troubleshooting"
    - "Behavioral (Leadership Principles focus)"
    - "Bar Raiser (cross-functional LP + technical)"

topic_weights:
  behavioral_lp: 35%
  troubleshooting: 25%
  linux_infrastructure: 20%
  coding: 10%
  system_design: 10%

lp_focus:
  primary:
    - Ownership: "Takes accountability for outcomes, not just tasks"
    - Bias for Action: "Acts with calculated speed; makes decisions with incomplete info"
    - Dive Deep: "Gets into the details; knows their systems at depth"
    - Operational Excellence: "Runbooks, monitoring, rollback — not heroics"
  secondary:
    - Customer Obsession: "How does this affect the end user?"
    - Deliver Results: "What actually shipped and what was the measurable impact?"
    - Invent and Simplify: "Did you remove complexity, not just manage it?"

topics_tested:
  behavioral:
    - STAR format expected throughout — Situation, Task, Action, Result
    - Interviewers probe for YOUR specific role: "What did YOU do?" not "what did the team do?"
    - Follow-ups verify the story is real: "What exact command did you run?"
    - Negative examples asked: "Tell me about a time you failed"
  troubleshooting:
    - Production incident response with LP lens: Who owned it? What did you do specifically?
    - Post-mortem quality: Did you find the root cause? What was your prevention action?
    - On-call practices: runbook quality, escalation, monitoring
  linux_infrastructure:
    - AWS services: EC2, ECS/EKS, Lambda, RDS — how they fail and how to debug them
    - Infrastructure as Code: Terraform or CloudFormation
    - CI/CD pipeline design and debugging
  coding:
    - Automation scripting: Python or Shell for ops tasks
    - Lambda functions, boto3 for AWS automation
    - Less algorithmic than Google — more practical ops scripting

expected_depth:
  behavioral: high
  troubleshooting: medium-high
  linux_infrastructure: medium
  coding: medium
  system_design: low-medium

hiring_bar:
  strong_hire: >
    Every answer is precise and owned. "I built the runbook. I discovered the root cause.
    I changed the alert threshold because..." LP connection is natural, not performed.
    Technical depth confirmed by specific details (command names, error messages, metrics).
  hire: >
    Good LP coverage with real stories. Technical bar is solid. Can demonstrate ownership
    with some prompting. System design is operationally minded.
  borderline: >
    LP stories exist but ownership is shared and vague. Technical bar is present but
    not deep — can't answer follow-up questions about their own past work.
  no_hire: >
    LP coverage is thin or performed. Stories lack specific technical details.
    Cannot demonstrate what they specifically did vs what the team did.

common_mistakes:
  - "Saying 'we' without clarifying their personal role — interviewers will probe this hard"
  - "LP stories without measurable outcomes — 'it went well' is not enough"
  - "Not knowing the technical details of systems they claim to have built"
  - "Treating behavioral rounds as soft rounds — they carry 35% of the signal"
  - "Incident stories without root cause analysis or prevention steps"

prep_focus:
  high:
    - 5-6 strong STAR stories across the 14 Leadership Principles
    - Each story must have specific technical details + measurable outcome
    - Production incident stories with clear root cause and prevention
    - AWS service failure modes and debugging
  medium:
    - Infrastructure as Code (Terraform modules, state management)
    - CI/CD pipeline design and debugging
    - On-call runbook design
  lower:
    - Advanced algorithms
    - Pure networking internals (though basic AWS networking is expected)
