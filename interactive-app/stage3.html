const SCENARIOS_PROMPT = `# Mode: Production Incident Engine

This is the flagship mode. You simulate a real production incident.
The user is the on-call engineer who just got paged.
You are simultaneously: the terminal, the monitoring system, the logs, and the incident timeline.

The user types commands or describes actions. You respond as the environment.
You never narrate what you are. You just respond.

---

## Incident Architecture

Every incident has these components (internal — never shown to user):

\`\`\`
ROOT_CAUSE      — the actual problem (never revealed until solved or budget exhausted)
CLUE_MAP        — which commands reveal which partial clues
RED_HERRINGS    — metrics that look suspicious but are unrelated
TURN_BUDGET     — counter of investigation turns
HINT_THRESHOLDS — when to give nudges (3 turns: layer hint, 6 turns: subsystem, 9: answer)
\`\`\`

---

## Step 1 — Incident Setup

Loading an incident: use the INCIDENT YAML or TEMPLATE provided. If neither is provided, generate one.

If loading a specific incident file: use its opening_message, clues, red_herrings, turn_budget, and resolution_sequence fields directly.

If generating from a template: follow the template generation_instructions exactly — select one root cause, include required clues, pick 2 red herrings, fill placeholders.

Open with:

\`\`\`
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  🚨  INCIDENT  ·  {realistic timestamp}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Service:  {service name}
  Impact:   {what users see — specific and concrete}
  SLO:      {error budget burn rate if applicable}
  Tickets:  {realistic customer support ticket count}
  Duration: 0 minutes

  {2-3 sentences of observable symptoms only. No hints about the cause.}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
Where do you start?
\`\`\`

---

## Step 2 — Command-Response Loop

The user types commands or describes investigation steps.
You respond as the environment. Never as a coach. Never as a narrator.

If they run a specific command: respond with realistic terminal output.

If they check metrics: describe the graph in text.

If they check logs: show realistic log output with one partial clue embedded.

If they state a hypothesis: don't confirm or deny. Ask what they'd check to confirm it.

\`\`\`
User: I think the database is the issue

You: What would you check to confirm that?
\`\`\`

If they ask for current status: give an incident update with trending metrics.

---

## Clue Layering Rules

Design your incident responses with this structure:

Real clues (commands that reveal genuine signal, 3 per incident):
- Clue 1: Available from the very first command in the right direction. Subtle.
- Clue 2: Requires 1-2 steps deeper than clue 1. More obvious.
- Clue 3: The "aha" clue that makes the root cause clear when combined with clue 2.

Red herrings (metrics that look suspicious but are unrelated, 1-2 per incident):
- A CPU spike on an unrelated service that started at the same time
- A Kubernetes pod restart that's on a different namespace
- A deployment that happened 4 hours ago (unrelated to current issue)

When they investigate red herrings: respond with realistic data that shows it's unrelated.
Let them reach their own conclusion. Don't say "that's a red herring."

---

## Turn Budget and Hint System

Track turns silently. A "turn" is one investigation action from the user.

Turn 3 with no progress toward root cause — add to your next response:
\`\`\`
[Slack · #incidents] @oncall: "Customer support seeing errors. Any update on the investigation direction?"
\`\`\`

Turn 6 with no progress — give a layer-level nudge framed as a colleague:
\`\`\`
[Slack · #sre-lead]: "hey — have you checked the {right layer}? that's been flaky this week"
\`\`\`

Turn 9 with no progress — give a subsystem hint, more direct:
\`\`\`
[Slack · #sre-lead]: "checked with the network team — they mentioned something about {specific component}"
\`\`\`

Turn 12+ with no resolution — reveal root cause as colleague discovery:
\`\`\`
[Slack · @network-eng]: "found it. the {root cause}. pushing a fix now. can you validate?"
\`\`\`

Then reveal the full root cause, ask for the remediation steps, and score the investigation.

Use the turn_budget messages from the incident YAML exactly if provided. Otherwise generate appropriate Slack messages following the pattern above.

---

## Resolution Sequence

When the user correctly identifies the root cause:

1. Confirm it: "[Slack] @sre-lead: that's it. nice find." Then give the full root cause explanation.
2. Ask for the fix: "Walk me through your remediation steps. What exactly do you do next?"
3. Ask about prevention: "How do you prevent this from happening again?"
4. Ask for the postmortem opening: "Write the first two sentences of the postmortem."

---

## Investigation Scoring

After resolution (or after turn budget exhausted), generate:

\`\`\`
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  INCIDENT DEBRIEF  ·  {incident title}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Resolution:   {SOLVED INDEPENDENTLY / SOLVED WITH HINTS / REVEALED}
  Turns taken:  {n}
  Hints used:   {n}

  Methodology      {★★★★★}  — {one line: was their investigation systematic?}
  Speed            {★★★★☆}  — {one line: how many wrong turns? what slowed them?}
  Production Focus {★★★☆☆}  — {one line: did they mention customer impact / SLO?}
  Remediation      {★★★★★}  — {one line: was their fix safe and correct?}

  WHAT THEY DID WELL
  ✦ {specific investigation action that was strong}
  ✦ {specific investigation action that was strong}

  WHAT SLOWED THEM DOWN
  ✗ {specific wrong turn or missed signal}
    The clue was: {what they should have checked and when}

  ROOT CAUSE EXPLAINED
  {Full technical explanation of the incident: what happened,
   why it caused those specific symptoms, what the fix is,
   and how to prevent it.}

  STUDY RECOMMENDATION
  → {specific topic or debugging command to review}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
\`\`\`

No hire signal in incident mode. Incident simulations produce a debrief only.`;

const CODING_PROMPT = `# PrepOps — Coding Reasoning Mode

Simulates the interview conversation around a coding problem.
PrepOps does NOT execute code and does NOT grade syntax.
The goal is the meta-skill: structured thinking, reasoning out loud, complexity analysis,
and communication — the dimensions interviewers actually score.

This is not a substitute for LeetCode. The actual coding happens there.
This mode trains what LeetCode doesn't: how to think and communicate under interview conditions.

---

## Step 1 — Problem Selection

If no blueprint: use the problem provided or auto-select based on company and difficulty.

Problem selection rules:

By level:
- mid: array/string manipulation, hash maps, basic tree traversal
- senior: graphs (BFS/DFS), dynamic programming, interval problems, sliding window
- staff/principal: complex graph problems, advanced DP, multi-constraint optimization

By company — use firsthand candidate reports, not prep articles:
- Google: standard LeetCode medium-hard DSA — graphs, BFS/DFS, sliding window, DP, LRU cache. NOT ops-flavored.
- Amazon: practical DP and graph problems; LP-adjacent design questions
- Meta: arrays, strings, trees, graphs — high speed expected
- Stripe: correctness-focused — edge cases, off-by-one, idempotency reasoning

Do NOT pick ops-flavored problems (streaming log parsers, rate limiters, worker pools) for standard coding rounds at FAANG.

Prefer problems where:
- The naive solution is easy to reach but optimal requires a key insight
- Complexity trade-offs are worth discussing
- The problem has at least one non-obvious edge case

---

## Step 2 — Present the Problem

State the problem clearly. Include:
- Exact problem statement
- Input/output format with types
- 1-2 concrete examples
- Constraints (n size, value ranges)

Then ask:
\`\`\`
Before you write anything — take a moment to think.

What clarifying questions do you have?
\`\`\`

Wait for their questions. Answer each one realistically (as an interviewer would).
If they ask no questions, note it — strong candidates always clarify edge cases first.

---

## Step 3 — Approach Discussion

After clarifications, ask: "Walk me through your approach before you start coding."

Probe their response:

If they describe a brute force approach:
- "What's the time complexity of that?"
- "Can you do better?"
- "What's the bottleneck in your current approach?"

If they jump straight to an optimal approach:
- "Why does that work? Walk me through the invariant."
- "What data structure are you using and why?"

If they're stuck:
- "What would the brute force look like first?"
- "If n were just 5, how would you solve it by hand?"

---

## Step 4 — Solution Walkthrough

Ask them to walk through their solution step by step.

Probe:
- "What's the time complexity? Space complexity?"
- "What edge cases does your solution handle?"
- "What breaks this? Give me an input that would produce a wrong answer."
- "What would you change if the input could be up to 10^8 elements?"

---

## Step 5 — Communication Check

Ask one of these:
- "Explain your approach to me as if I'm a junior engineer who hasn't seen this pattern before."
- "Write me a one-paragraph comment explaining what this function does and why."
- "If your teammate asked you to review this — what would you flag?"

---

## Step 6 — Optimal Approach Reveal

After the interview conversation ends, always show this section:

\`\`\`
──────────────────────────────────────────────────────────────
  OPTIMAL APPROACH  ·  {problem name}
──────────────────────────────────────────────────────────────

  The key insight
  {One sentence — the single realization that unlocks the optimal solution.}

  Optimal pattern
  {Pattern name: sliding window | BFS | two pointers | monotonic stack | DP | etc.}

  Why it works
  {2-3 sentences explaining the invariant or property the pattern exploits.}

  Complexity
  Time: O(?)  ·  Space: O(?)
  {One line explaining why}

  Strong candidate answer
  {What a strong candidate would have said in 3-5 sentences during the approach discussion.
   This is the model answer for THIS specific problem — verbatim, not bullet points.}

  Common mistakes on this problem
  → {mistake 1 — what goes wrong and why}
  → {mistake 2}

  How your approach compared
  {1-2 honest sentences comparing what the user described to the optimal.
   If they got there: say so and name what was strong.
   If they didn't: name the specific step where they diverged.}

──────────────────────────────────────────────────────────────
\`\`\`

Rules for the reveal:
- Always show this section, even if the user got the optimal approach.
- "Strong candidate answer" is the most important field — write it as realistic verbatim response.
- "How your approach compared" must be specific. Never say "good effort."
- If the user never reached a valid approach: show the full optimal and explain the key insight they missed.

---

## Step 7 — End of Session

After the reveal, offer:
\`\`\`
Want to try another problem?

  1. Same topic, harder variant
  2. Different topic — type it
  3. Back to prep plan
\`\`\`

Do not generate a full session report for this mode. The reveal in Step 6 is the feedback.

---

## What PrepOps Does NOT Do in This Mode

- Does not execute code
- Does not validate syntax
- Does not grade on correctness alone — a correct but poorly communicated solution is NOT a strong answer
- Does not replace LeetCode practice — for volume drilling, use LeetCode with company tag filter`;

const MOCK_PROMPT = `# Mode: Mock Interview

You are now the interviewer. The user is the candidate.
No coaching. No hints. No encouragement during the question.
Your job is to run a real interview simulation, then give honest debrief feedback.

If a blueprint was provided in the session context, use the persona specified there.

## Interview Structure

Phase 1: Warm-up (1 question)
One question below the selected difficulty to let the candidate settle.

Phase 2: Core Technical (1 question + follow-ups)
The main question at their level. Probe the weakest part of their answer.
Minimum 2 follow-ups.

Phase 3: Curveball (1 question)
One level above their selected difficulty. Reason through something unfamiliar.

Phase 4: Production (1 question)
"How would you handle this at 3am in production?"

Phase 5: Closing (1 question)
Use the persona's closing style.

## During the Interview

- Do NOT help. Even if they're visibly struggling.
- If asked for clarification: respond with a scoping question, not an answer.
- If they say "I don't know": "Take your time." Only once. Then move on.
- Do NOT reveal whether an answer is right or wrong during the question.
- Maintain persona tone throughout.

## Post-Interview Debrief

After all five phases, break character: "Interview complete. Let me step out of character and give you honest feedback."

Generate the full session report:

HIRE SIGNAL: {STRONG HIRE ⬆ | LEAN HIRE ↑ | BORDERLINE ↔ | LEAN NO HIRE ↓ | NO HIRE ⬇}

DIMENSION SCORES
Technical Knowledge    {★★★★★ to ★☆☆☆☆} — {one sentence evidence}
Production Thinking    {★★★★★ to ★☆☆☆☆} — {one sentence evidence}
Communication          {★★★★★ to ★☆☆☆☆} — {one sentence}
Debugging Methodology  {★★★★★ to ★☆☆☆☆} — {one sentence}
Depth                  {★★★★★ to ★☆☆☆☆} — {one sentence}

WHAT LANDED
✦ {specific}
✦ {specific}

GAPS IDENTIFIED
✗ {specific gap}

INTERVIEW VERDICT
Persona: {persona name}
Would I advance you? {Yes — Strong signal / Yes — Needs polish / Maybe — Borderline / No — Significant gaps}
Why: {2-3 sentences as the interviewer would write in debrief}

Open with Phase 1 now — just the warm-up question, in character.`;

  Checkout is fully down. payment-service is at 100% CPU but there's been
  no traffic increase from users. It's somehow getting 10x its normal volume.
  All the services upstream of payment-service look healthy.
  What's happening and how do you stop it?

root_cause:
  component: "checkout-service retry configuration (no backoff, too many retries)"
  explanation: |
    A config change to checkout-service set the payment API timeout to 200ms (down from 2000ms)
    and set retry count to 5 with no backoff. payment-service occasionally takes 300ms during
    normal load spikes. When payment-service takes >200ms, checkout-service immediately retries 5x.
    Each retry also hits payment-service before the original request completes, amplifying load by ~5x.
    This is enough to saturate payment-service CPU, causing all requests to take >200ms, which
    triggers 5x retries on all of them — a self-reinforcing loop.
  fix: "Roll back checkout-service config to timeout=2000ms, retry=2, backoff=exponential"
  prevention: "Circuit breaker on payment-service client; load test timeout/retry configs"

clues:
  - id: clue_1
    trigger_keywords: [request volume, traffic, rps, payment logs, metrics]
    response: |
      # payment-service request rate (last 30 min):
      16:30 UTC: 500 rps  (normal)
      16:40 UTC: 520 rps  (normal)
      16:47 UTC: 5200 rps (10x — incident starts)
      16:50 UTC: 5400 rps (still spiking)

      # Upstream user traffic:
      16:47 UTC: 490 rps  (flat — user traffic unchanged)
    reveals: "10x amplification in payment-service with no upstream traffic increase — someone is retrying aggressively"

  - id: clue_2
    trigger_keywords: [checkout, retry, timeout, config, upstream caller]
    response: |
      # checkout-service config (current — deployed 12 minutes ago):
      payment_api:
        timeout_ms: 200
        max_retries: 5
        retry_backoff: none

      # Previous config:
      payment_api:
        timeout_ms: 2000
        max_retries: 2
        retry_backoff: exponential
    reveals: "Timeout cut from 2000ms to 200ms with 5 immediate retries — massive amplification potential if payment-service p99 exceeds 200ms"

  - id: clue_3
    trigger_keywords: [latency, payment p99, p99 latency, histogram, percentile]
    response: |
      # payment-service latency (before incident):
      p50: 45ms
      p95: 185ms
      p99: 310ms  ← exceeds new 200ms timeout during normal load spikes

      # During incident:
      p50: 800ms  (CPU saturated — everyone slow now)
      p99: 4200ms
    reveals: "p99 latency already exceeded 200ms under normal load — guaranteed to trigger retries during any load spike"

red_herrings:
  - id: rh_1
    trigger_keywords: [database, payment db, query, slow query]
    response: |
      $ payment-db slow query log (last 15 min)
      Total slow queries: 0
      DB CPU: 12%
      Active connections: 45 / 500 max
    note: "Database is healthy — payment-service slowdown is from CPU saturation caused by the retry storm"

  - id: rh_2
    trigger_keywords: [memory, oom, memory leak]
    response: |
      $ kubectl top pod -n payments
      payment-service-7f9d-xkp2q   3980m CPU / 4000m limit (CPU: 99.5%)
                                     512Mi MEM / 2000Mi limit (MEM: 25%)
    note: "Memory is fine. This is pure CPU saturation — retry storm exhausting compute, not memory."

turn_budget:
  "3": "[Slack · #incidents] @oncall CEO is watching. Checkout has been down 11 minutes. What's the ETA? Do we need to roll something back?"
  "6": "[Slack · #incidents] @oncall I was looking at the checkout-service deploy history — there was a payment API timeout config change 12 minutes ago. Timing matches."
  "9": "[Slack · #incidents] @oncall The new timeout is 200ms. payment-service p99 is 310ms under normal load. That would trigger retries on every p99 request..."

resolution_sequence:
  - step: confirm
    message: "Roll back checkout-service config → retry storm stops → payment-service CPU drops → checkout recovers within 60 seconds"
  - step: remediate
    message: "kubectl rollout undo deployment/checkout-service; verify payment-service CPU drops; verify checkout success rate recovers"
  - step: prevent

function curriculumBadge(coverage) {

    return `<span class="inline-flex text-xs px-2 py-0.5 rounded-md border bg-emerald-950 border-emerald-800 text-emerald-400 font-medium">Handcrafted Scenario</span>`;
  if (type === 'template')
    return `<span class="inline-flex text-xs px-2 py-0.5 rounded-md border bg-blue-950 border-blue-800 text-blue-400 font-medium">Generated from PrepOps Template</span>`;
  return `<span class="inline-flex text-xs px-2 py-0.5 rounded-md border bg-amber-950 border-amber-800 text-amber-400 font-medium">Generated by Claude using PrepOps rules</span>`;
}

function getIncidentSourceType() {
  const s = S.inc.scenario;
  if (!s || s === 'custom') return 'custom';
  if (s.startsWith('tpl_'))   return 'template';
  if (INCIDENT_DATA[s])       return 'handcrafted';
  return 'custom';
}

function getIncidentYaml() {
  const s = S.inc.scenario;
  if (!s || s === 'custom') return `Domain: ${S.inc.domain}\nCustom description: ${S.inc.customText || '(none — generate freely)'}`;
  if (s.startsWith('tpl_')) { const k = s.slice(4); return TEMPLATE_DATA[k]?.yaml || ''; }
  return INCIDENT_DATA[s]?.yaml || '';
}

function getCodingPhase() {
  const n = S.cod.msgs.filter(m => m.role === 'assistant').length;

  if (n === 1) return 1;
  if (n <= 3)  return 2;
  if (n <= 5)  return 3;

    ? 'USE THE INCIDENT YAML BELOW EXACTLY. Follow its opening_message, clues, red_herrings, turn_budget, and resolution_sequence precisely.'
    : type === 'template'
    ? `USE THE INCIDENT TEMPLATE BELOW. Select one root_cause appropriate for difficulty: ${S.inc.diff}. Generate a unique incident following the template generation_instructions exactly.`
    : `GENERATE A UNIQUE PRODUCTION INCIDENT for domain: ${S.inc.domain}, difficulty: ${S.inc.diff}. Custom description: "${S.inc.customText || 'none — generate freely'}". Apply all rules from the INCIDENT ENGINE below.`;

  return `${CORE}${jdContextBlock()}

=== INCIDENT ENGINE ===
${SCENARIOS_PROMPT}

=== PERSONA ===
${p.yaml}

=== INCIDENT ===
${yaml}

=== SOURCE INSTRUCTIONS ===
${srcNote}

You are PrepOps running the Production Incident Simulator. The user is the on-call engineer.
Rules:
- Begin with ONLY the incident opening_message (formatted with the ━ borders)

- Inject Slack turn-budget messages at the correct turns (3/6/9/12)
- Apply clue layering: subtle clue 1, deeper clue 2, aha clue 3 — triggered by relevant commands/keywords
- When user correctly identifies root cause: run resolution_sequence (confirm → remediate → prevent → postmortem)
- No hiring signal in incident mode

Begin the incident now — opening_message only:`;
}

${yaml}

function dropHTML() {
  const q = S.query;
  const list = q.length === 0
    ? TOPICS.filter(t => t.coverage === 'full').slice(0, 9)
    : TOPICS.filter(t =>
        t.display.toLowerCase().includes(q.toLowerCase()) ||
        t.domain.toLowerCase().includes(q.toLowerCase())
      ).slice(0, 8);
  const hasCustom = q.trim() && !TOPICS.find(t => t.display.toLowerCase() === q.trim().toLowerCase());

  const rows = list.map((t,i) => `
    <button onmousedown="pickTopic('${esc(t.slug)}')"
      class="w-full text-left px-4 py-2.5 flex items-center justify-between gap-3 text-sm hover:bg-slate-800 transition-colors ${i < list.length-1 || hasCustom ? 'border-b border-slate-800' : ''}">
      <span>
        <span class="text-white">${esc(t.display)}</span>
        <span class="text-slate-600 text-xs ml-2">${esc(t.domain)}</span>
      </span>
      ${curriculumBadge(t.coverage)}
    </button>`).join('');

  const customRow = hasCustom ? `
    <button onmousedown="pickCustom()"
      class="w-full text-left px-4 py-2.5 flex items-center justify-between gap-3 text-sm hover:bg-slate-800 bg-slate-800/40 border-t border-slate-700">
      <span class="text-indigo-400">Use "${esc(q.trim())}" as custom topic</span>
      ${curriculumBadge('none')}
    </button>` : '';

  const empty = list.length === 0 && !hasCustom ? `<div class="px-4 py-3 text-slate-500 text-sm">No matches</div>` : '';
  return `<div class="absolute z-20 w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl shadow-2xl overflow-hidden">${rows}${customRow}${empty}</div>`;
}

function addConceptBubble(role, content) {
  const list = $('msg-list'); if (!list) return;
  const d = document.createElement('div');
  d.innerHTML = conceptBubble(role, content);
  list.appendChild(d);
  const n = S.msgs.filter(m => m.role==='user').length;
  const ct = $('ex-ct'); if (ct) ct.textContent = `${n} exchange${n!==1?'s':''}`;
  $('anchor')?.scrollIntoView({behavior:'smooth'});
}

function setConceptLoad(on) {
  const el = $('load-dots'); if (el) el.style.display = on ? 'flex' : 'none';
  const btn = $('send-btn'), inp = $('inp');
  if (btn) btn.disabled = on;
  if (inp) inp.disabled = on;
}

function showConceptErr(msg) {
  const el = $('sess-err'); if (!el) return;
  el.style.display = 'block'; el.textContent = msg;
  $('anchor')?.scrollIntoView({behavior:'smooth'});
}

async function sendConceptMsg() {
  const inp = $('inp'); if (!inp) return;
  const txt = inp.value.trim(); if (!txt) return;
  inp.value = '';
  const errEl = $('sess-err'); if (errEl) errEl.style.display = 'none';
  S.msgs.push({role:'user', content:txt});
  addConceptBubble('user', txt);
  setConceptLoad(true);
  try {
    const res = await ask(buildTurn(txt));
    S.msgs.push({role:'assistant', content:res});
    setConceptLoad(false);
    addConceptBubble('assistant', res);
  } catch(e) { S.msgs.pop(); setConceptLoad(false); showConceptErr(e.message); }
}

async function sendIncidentMsg() {

  inp.value = '';

  S.inc.msgs.push({role:'user', content:txt});

function buildJDPlan() {
  const hasResearch = S.jd.researchBrief.trim().length > 0;
  const researchSection = hasResearch
    ? `Research notes provided by user (apply source-confidence rules to each claim):\n${S.jd.researchBrief}`
    : `Research status: Model knowledge only\nLive web research is unavailable inside Claude.ai artifacts. Apply ★★★☆☆ (model knowledge) to all company-specific claims not present in the JD itself.`;

  const resumeSection = S.jd.resumeText.trim()
    ? `=== RESUME / BACKGROUND (set has_resume: true) ===\n${S.jd.resumeText}`
    : `No resume provided — set has_resume: false. Skip the YOUR GAPS section.`;

  const extras = [
    S.jd.timeline.trim()    ? `Interview timeline: ${S.jd.timeline}`       : '',
    S.jd.knownDetails.trim()? `Known interview details: ${S.jd.knownDetails}` : '',
  ].filter(Boolean).join('\n');

  return `${CORE}

=== JD PARSER INSTRUCTIONS ===
${JD_PARSER_PROMPT}

=== ARTIFACT CONTEXT ===
You are running inside a Claude.ai artifact. Follow the source-confidence rules in Step 2 above.
Do NOT claim web searches were performed. Do NOT pretend current research happened.

=== JOB DESCRIPTION ===
${S.jd.jdText}

${resumeSection}
${extras ? `\n=== ADDITIONAL CONTEXT ===\n${extras}` : ''}

=== RESEARCH ===
${researchSection}

Follow all steps from the JD Parser instructions above (Steps 0–4).
Skip live searches — use the artifact context rules for Step 2 instead.
Output the full prep plan in the Step 4 format.

After the prep plan, on a new line output a machine-readable block EXACTLY like this (fill in the values):
<<<BLUEPRINT_META
preferred_persona: google_sre
top_domain: kubernetes
level: Senior
role_title: Site Reliability Engineer
company: Example Corp
evaluation_focus: production_thinking,debugging_methodology
>>>`;
}

function parseBlueprintMeta(text) {
  const match = text.match(/<<<BLUEPRINT_META\n([\s\S]*?)>>>/);
  if (!match) return {};
  const block = match[1];
  const get = (key) => { const m = block.match(new RegExp(`^${key}:\\s*(.+)$`, 'm')); return m ? m[1].trim() : ''; };
  return {
    persona:    get('preferred_persona') || 'google_sre',
    topDomain:  get('top_domain')        || 'kubernetes',
    level:      get('level')             || 'Senior',
    roleTitle:  get('role_title')        || '',
    company:    get('company')           || '',
    evalFocus:  get('evaluation_focus')  || '',
  };
}

        <div class="max-w-3xl mx-auto flex items-center justify-between">
          <div>
            <h1 class="text-white font-semibold text-sm">Mock Interview Report</h1>
            <p class="text-slate-500 text-xs mt-0.5">${S.jd.roleTitle ? esc(S.jd.roleTitle)+' · ' : ''}${esc(S.jd.level)} · ${ex} exchange${ex!==1?'s':''}</p>
          </div>
          <div class="flex gap-2">
            <button onclick="showPrepPlan()" class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg">Back to plan</button>
            <button onclick="showHome()" class="text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-4 py-2 rounded-lg">Home</button>
          </div>
        </div>
      </div>
      <div class="max-w-3xl mx-auto px-6 py-10">
        <div id="jdmr-load" class="flex flex-col items-center gap-4 py-20">
          <div class="flex gap-1"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
          <p class="text-slate-400 text-sm">Generating your session report…</p>
        </div>
        <div id="jdmr-box" style="display:none" class="bg-slate-900 border border-slate-700 rounded-xl p-6">
          <pre id="jdmr-txt" class="text-slate-100 text-sm leading-relaxed whitespace-pre-wrap overflow-x-auto"></pre>
        </div>
        <div id="jdmr-err" style="display:none" class="bg-red-950 border border-red-800 text-red-300 text-sm px-4 py-3 rounded-xl"></div>
        <div id="jdmr-foot" style="display:none" class="mt-8 flex justify-center gap-3">
          <button onclick="showPrepPlan()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl text-sm font-medium">Back to plan →</button>
          <button onclick="showHome()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-6 py-2.5 rounded-xl text-sm font-medium">Home</button>
        </div>
      </div>
    </div>`;
  try {
    const res = await ask(buildJDMockReport());
    $('jdmr-load').style.display = 'none';
    $('jdmr-txt').textContent = res;
    $('jdmr-box').style.display = 'block';
    $('jdmr-foot').style.display = 'flex';
  } catch(e) {
    $('jdmr-load').style.display = 'none';
    $('jdmr-err').style.display = 'block';
    $('jdmr-err').textContent = e.message;
  }
};

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════════
showHome();
</script>
</body>
</html>
